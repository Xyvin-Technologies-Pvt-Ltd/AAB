name: Backend Deploy to AWS Lightsail

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  deploy:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd backend
          docker build -t accounting-backend:latest .

      - name: Save Docker image to tarball
        run: |
          docker save accounting-backend:latest | gzip > /tmp/accounting-backend.tar.gz
          echo "Image size: $(du -sh /tmp/accounting-backend.tar.gz | cut -f1)"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: Add Lightsail host to known hosts
        run: |
          LIGHTSAIL_HOST_ONLY=$(echo ${{ secrets.LIGHTSAIL_HOST }} | sed 's/.*@//')
          ssh-keyscan -H ${LIGHTSAIL_HOST_ONLY} >> ~/.ssh/known_hosts

      - name: Transfer image to Lightsail
        run: |
          scp -o StrictHostKeyChecking=no /tmp/accounting-backend.tar.gz ${{ secrets.LIGHTSAIL_HOST }}:/tmp/accounting-backend.tar.gz

      - name: Create deploy script
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRE: ${{ secrets.JWT_EXPIRE }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          LOGIN_URL: ${{ secrets.LOGIN_URL }}
        run: |
          cat > /tmp/deploy-backend.sh << DEPLOY_SCRIPT
          #!/bin/bash
          set -e

          echo "Loading Docker image..."
          docker load < /tmp/accounting-backend.tar.gz

          echo "Stopping existing container..."
          docker stop accounting-backend || true
          docker rm accounting-backend || true

          echo "Starting new container..."
          docker run -d \
            --name accounting-backend \
            --restart unless-stopped \
            -p 5001:5001 \
            -e NODE_ENV=production \
            -e PORT=5001 \
            -e MONGODB_URI="${MONGODB_URI}" \
            -e JWT_SECRET="${JWT_SECRET}" \
            -e JWT_EXPIRE="${JWT_EXPIRE}" \
            -e AWS_REGION="${AWS_REGION}" \
            -e AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID}" \
            -e AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY}" \
            -e AWS_S3_BUCKET_NAME="${AWS_S3_BUCKET_NAME}" \
            -e FRONTEND_URL="${FRONTEND_URL}" \
            -e OPENAI_API_KEY="${OPENAI_API_KEY}" \
            -e ENCRYPTION_KEY="${ENCRYPTION_KEY}" \
            -e EMAIL_HOST="${EMAIL_HOST}" \
            -e EMAIL_PORT="${EMAIL_PORT}" \
            -e EMAIL_USER="${EMAIL_USER}" \
            -e EMAIL_PASS="${EMAIL_PASS}" \
            -e LOGIN_URL="${LOGIN_URL}" \
            accounting-backend:latest

          echo "Cleaning up tarball and deploy script..."
          rm -f /tmp/accounting-backend.tar.gz /tmp/deploy-backend.sh

          echo "Pruning old Docker images..."
          docker image prune -f

          echo "Waiting for container to start..."
          sleep 10

          for i in \$(seq 1 30); do
            if curl -sf http://localhost:5001/health > /dev/null 2>&1; then
              echo "Container is healthy!"
              exit 0
            fi
            echo "Waiting for health check... (\$i/30)"
            sleep 2
          done

          echo "Health check failed!"
          docker logs accounting-backend
          exit 1
          DEPLOY_SCRIPT
          chmod +x /tmp/deploy-backend.sh

      - name: Upload and run deploy script
        run: |
          scp -o StrictHostKeyChecking=no /tmp/deploy-backend.sh ${{ secrets.LIGHTSAIL_HOST }}:/tmp/deploy-backend.sh
          ssh -o StrictHostKeyChecking=no ${{ secrets.LIGHTSAIL_HOST }} "bash /tmp/deploy-backend.sh"
          rm -f /tmp/deploy-backend.sh

      - name: Verify Deployment
        run: |
          sleep 5
          LIGHTSAIL_HOST_ONLY=$(echo ${{ secrets.LIGHTSAIL_HOST }} | sed 's/.*@//')
          ssh -o StrictHostKeyChecking=no ${{ secrets.LIGHTSAIL_HOST }} "docker ps | grep accounting-backend || exit 1"
          curl -f --max-time 10 http://${LIGHTSAIL_HOST_ONLY}/health || echo "Health check via nginx failed, but container is running"
